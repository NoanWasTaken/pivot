services:
  api:
    build: ./server
    container_name: pivot-api
    restart: unless-stopped
    networks:
      - web
    environment:
      PORT: 3001
      STEAM_API_KEY: ${STEAM_API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}

  web:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
    container_name: pivot-web
    restart: unless-stopped
    networks:
      - web
    depends_on:
      - api
    environment:
      PORT: 3000

networks:
  web:
    external: true
